---
- name: Intel sr-iov
  ansible.builtin.debug:
    msg: "Starting install procedure for sr-iov igpu virtualization"

- name: Ensure mokutil dependancy is installed
  ansible.builtin.apt:
    name: mokutil
    state: present
    update_cache: true

- name: Ensure git is installed
  ansible.builtin.apt:
    name: git
    state: present
    update_cache: true

- name: Ensure dkms is installed
  ansible.builtin.apt:
    name: dkms
    state: present
    update_cache: true

- name: Ensure sysfsutils is installed
  ansible.builtin.apt:
    name: sysfsutils
    state: present
    update_cache: true

- name: Query GitHub API for the latest release
  ansible.builtin.uri:
    url: "https://api.github.com/repos/strongtz/i915-sriov-dkms/releases/latest"
    method: GET
    return_content: true
    headers:
      Accept: "application/vnd.github.v3+json"
  register: github_release

- name: Raw release info
  ansible.builtin.debug:
    msg: "github release raw: {{ github_release }}"

- name: Extract the latest version and asset URL
  ansible.builtin.set_fact:
    latest_version: "{{ github_release.json.tag_name }}"
    asset_url: >-
      {{
        github_release.json.assets
        | selectattr('name', 'equalto',
                     'i915-sriov-dkms_{{ github_release.json.tag_name }}_amd64.deb')
        | map(attribute='browser_download_url')
        | first
      }}

- name: Ensure the asset URL was found
  ansible.builtin.fail:
    msg: "The asset URL could not be found for version {{ latest_version }}."
  when: asset_url is not defined

- name: Check if the package is already installed
  ansible.builtin.shell: "dpkg-query -W -f='${Version}' i915-sriov-dkms"
  register: installed_version
  failed_when: false
  changed_when: false

- name: Skip installation if the version is already installed
  ansible.builtin.debug:
  msg: "The latest version {{ latest_version }} is already installed."
  when: latest_version in installed_version.stdout

- name: Download the .deb file
  ansible.builtin.get_url:
    url: "{{ asset_url }}"
    dest: "/tmp/i915-sriov-dkms_{{ latest_version }}_amd64.deb"
    mode: '0644'
  when: latest_version not in installed_version.stdout

- name: Install the .deb package
  ansible.builtin.apt:
    deb: "/tmp/i915-sriov-dkms_{{ latest_version }}_amd64.deb"
  when: latest_version not in installed_version.stdout

- name: Debug the installed version
  ansible.builtin.debug:
    msg: "i915-sriov-dkms version {{ latest_version }} has been installed."
  when: latest_version not in installed_version.stdout

- name: Set Grub kernel parameters
  ansible.builtin.lineinfile:
    path: /etc/default/grub
    regexp: '^GRUB_CMDLINE_LINUX_DEFAULT=.*'
    line: 'GRUB_CMDLINE_LINUX_DEFAULT="quiet intel_iommu=on iommu=pt i915.enable_guc=3 i915.max_vfs=7"'
    backup: true

# In every system I've seen this has been 00:02.0 however if issues are encountered verify with lspci | grep VGA
- name: Overwrite /etc/sysfs.conf with SR-IOV configuration
  ansible.builtin.copy:
    content: |
      devices/pci0000:00/0000:00:02.0/sriov_numvfs = 7
    dest: /etc/sysfs.conf
    owner: root
    group: root
    mode: '0644'

- name: Update initramfs for all kernels
  ansible.builtin.shell: update-initramfs -u -k all

- name: Refresh Boot
  ansible.builtin.command: "proxmox-boot-tool refresh"
  register: proxmox_boot_refresh
  changed_when: proxmox_boot_refresh.rc == 0 and "no changes" not in proxmox_boot_refresh.stdout

- name: Reboot the system
  ansible.builtin.reboot:
    reboot_timeout: 600  # Adjust the timeout depending on how long the system takes to reboot
    msg: "Rebooting the system now, waiting up to 600 seconds for it to be available again"
  when: proxmox_boot_refresh is defined
  register: reboot_result

- name: Notify user of reboot completion
  ansible.builtin.debug:
    msg: "The system has rebooted and is back online."
  when: reboot_result is defined

- name: Run lspci and grep for VGA
  ansible.builtin.shell: "set -o pipefail && lspci | grep VGA"
  register: lspci_vga_output
  changed_when: false

- name: Run dmesg and grep for i915
  ansible.builtin.shell: "set -o pipefail && dmesg | grep i915"
  register: dmesg_i915_output
  changed_when: false

- name: Print lspci VGA output
  ansible.builtin.debug:
    msg: "lspci VGA output:\n{{ lspci_vga_output.stdout }}"

- name: Print dmesg i915 output
  ansible.builtin.debug:
    msg: "dmesg i915 output:\n{{ dmesg_i915_output.stdout }}"

- name: Notify of next steps
  ansible.builtin.debug:
    msg: "Intel SR-IOV has been configured, please check the above outputs to ensure there are multiple intel igpus"
